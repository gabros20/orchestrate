name: check-sync
# Release gate: run the universal skill-pack contract, then preserve orchestrate's byte-identical
# communication blocks, measured token claims, replicated invariants, and host adapter.
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-sync
